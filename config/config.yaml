# Update these specific blocks, leave the rest of the file as-is
data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/ihimanshu29/production-ready-ml-pipeline/raw/ca8663b9f00970cf7d97afc8e598d2e10c7c2f43/research/credit_data.zip # Update with your new URL
